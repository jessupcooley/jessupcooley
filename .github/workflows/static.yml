name: Deploy static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Set up Node.js environment
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # change to 'yarn' or 'pnpm' if you use those

      # 2. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 3. Build the Vite project (Creates the /dist folder)
      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 4. Upload ONLY the compiled folder, not the whole repository
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # <--- Crucial change! Vite outputs to 'dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
